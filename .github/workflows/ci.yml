name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── .NET: restore, build, and test (unit + integration) ───────────────────
  dotnet-build-test:
    name: .NET Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore AllByMyshelf.slnx

      - name: Build
        run: dotnet build AllByMyshelf.slnx --no-restore --configuration Release

      - name: Run tests
        run: dotnet test AllByMyshelf.slnx --no-build --configuration Release --verbosity normal

  # ── .NET: dependency vulnerability scan ───────────────────────────────────
  dotnet-dependency-scan:
    name: .NET Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore AllByMyshelf.slnx

      - name: Scan for vulnerable packages
        run: |
          output=$(dotnet list AllByMyshelf.slnx package --vulnerable --include-transitive 2>&1)
          echo "$output"
          if echo "$output" | grep -qi "has the following vulnerable packages"; then
            echo "Vulnerable packages detected. Failing the build."
            exit 1
          fi

  # ── Angular: production build ──────────────────────────────────────────────
  angular-build:
    name: Angular Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/AllByMyshelf.Web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/AllByMyshelf.Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create environment files
        run: cp src/environments/environment.template.ts src/environments/environment.prod.ts

      - name: Build (production)
        run: npx ng build --configuration production

  # ── npm: audit for high/critical vulnerabilities ──────────────────────────
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/AllByMyshelf.Web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/AllByMyshelf.Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

  # ── Secret scanning via Gitleaks ──────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
