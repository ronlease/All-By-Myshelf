<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#1a237e"/>

  <!-- Shelf frame: left side, right side, top board -->
  <rect x="3" y="5" width="2" height="24" rx="1" fill="#e8e0d0"/>
  <rect x="27" y="5" width="2" height="24" rx="1" fill="#e8e0d0"/>
  <rect x="3" y="5" width="26" height="2" rx="1" fill="#e8e0d0"/>

  <!-- Middle shelf -->
  <rect x="3" y="17" width="26" height="2" rx="1" fill="#e8e0d0"/>

  <!-- Bottom board -->
  <rect x="3" y="27" width="26" height="2" rx="1" fill="#e8e0d0"/>

  <!-- Books — bottom shelf (y from 19 to 27, height = 8) -->
  <rect x="6"  y="20" width="3" height="7" rx="0.5" fill="#ef5350"/>
  <rect x="10" y="21" width="3" height="6" rx="0.5" fill="#ffd54f"/>
  <rect x="14" y="19" width="3" height="8" rx="0.5" fill="#66bb6a"/>
  <rect x="18" y="21" width="3" height="6" rx="0.5" fill="#42a5f5"/>
  <rect x="22" y="20" width="3" height="7" rx="0.5" fill="#ce93d8"/>

  <!-- Books — top shelf (y from 7 to 17, height up to 10) -->
  <rect x="6"  y="9"  width="3" height="8" rx="0.5" fill="#26c6da"/>
  <rect x="10" y="10" width="3" height="7" rx="0.5" fill="#ef5350"/>
  <rect x="14" y="8"  width="3" height="9" rx="0.5" fill="#ffd54f"/>
  <rect x="18" y="10" width="3" height="7" rx="0.5" fill="#66bb6a"/>
  <rect x="22" y="9"  width="3" height="8" rx="0.5" fill="#ff8a65"/>
</svg>
