<mat-toolbar color="primary">
  <span>All By Myshelf</span>
  <span class="toolbar-spacer"></span>
  <button
    mat-raised-button
    color="accent"
    [disabled]="syncing()"
    (click)="onSyncClick()"
  >
    @if (syncing()) {
      Syncing...
    } @else {
      Sync Collection
    }
  </button>
</mat-toolbar>

<div class="page-content">
  @if (loading()) {
    <div class="spinner-container">
      <mat-spinner></mat-spinner>
    </div>
  } @else {
    @if (releases.length === 0) {
      <mat-card>
        <mat-card-content>
          <p class="empty-state">
            Your collection is empty. Run a sync to import your Discogs records.
          </p>
        </mat-card-content>
      </mat-card>
    } @else {
      <table mat-table [dataSource]="releases" class="collection-table mat-elevation-z2">

        <ng-container matColumnDef="artist">
          <th mat-header-cell *matHeaderCellDef>Artist</th>
          <td mat-cell *matCellDef="let release">{{ release.artist }}</td>
        </ng-container>

        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef>Title</th>
          <td mat-cell *matCellDef="let release">{{ release.title }}</td>
        </ng-container>

        <ng-container matColumnDef="year">
          <th mat-header-cell *matHeaderCellDef>Year</th>
          <td mat-cell *matCellDef="let release">{{ release.year ?? '—' }}</td>
        </ng-container>

        <ng-container matColumnDef="format">
          <th mat-header-cell *matHeaderCellDef>Format</th>
          <td mat-cell *matCellDef="let release">{{ release.format }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="onRowClick(row)"></tr>
      </table>

      <mat-paginator
        [length]="totalCount"
        [pageSize]="pageSize"
        [pageIndex]="currentPage() - 1"
        [pageSizeOptions]="[20]"
        (page)="onPageChange($event)"
        aria-label="Select page of releases"
      ></mat-paginator>
    }
  }
</div>
