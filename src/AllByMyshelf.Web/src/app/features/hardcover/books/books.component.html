<div class="page-content">
  @if (loading()) {
    <div class="spinner-container">
      <mat-spinner></mat-spinner>
    </div>
  } @else if (books().length === 0) {
    <div class="empty-state">
      <p>No books found. Click "Sync Books" to import your Hardcover library.</p>
    </div>
  } @else {
    <table mat-table [dataSource]="books()" class="collection-table mat-elevation-z2">
      <ng-container matColumnDef="thumbnail">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let book" class="thumbnail-cell">
          @if (book.coverImageUrl) {
            <img [src]="book.coverImageUrl" [alt]="book.title + ' cover'" class="release-thumbnail" />
          } @else {
            <mat-icon class="release-art-icon" style="font-size: 40px; width: 40px; height: 40px;">menu_book</mat-icon>
          }
        </td>
      </ng-container>

      <ng-container matColumnDef="author">
        <th mat-header-cell *matHeaderCellDef>Author</th>
        <td mat-cell *matCellDef="let book">{{ book.author ?? '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Title</th>
        <td mat-cell *matCellDef="let book">{{ book.title }}</td>
      </ng-container>

      <ng-container matColumnDef="genre">
        <th mat-header-cell *matHeaderCellDef>Genre</th>
        <td mat-cell *matCellDef="let book">{{ book.genre ?? '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="year">
        <th mat-header-cell *matHeaderCellDef>Year</th>
        <td mat-cell *matCellDef="let book">{{ book.year ?? '—' }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="onRowClick(row)" class="clickable-row"></tr>
    </table>

    <mat-paginator
      [length]="totalCount()"
      [pageSize]="pageSize"
      [pageIndex]="currentPage() - 1"
      [pageSizeOptions]="[25]"
      (page)="onPageChange($event)"
      aria-label="Select page of books"
    ></mat-paginator>
  }
</div>
