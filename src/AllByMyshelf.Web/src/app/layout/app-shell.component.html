<mat-toolbar color="primary">
  <span>All By Myshelf</span>
  <span class="toolbar-spacer"></span>
  @if (features()?.discogsEnabled) {
    <button mat-raised-button routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }" style="margin-right: 8px;">
      💿 Records
    </button>
  }
  @if (features()?.hardcoverEnabled) {
    <button mat-raised-button routerLink="/books" routerLinkActive="active-link" style="margin-right: 8px;">
      📚 Books
    </button>
  }
  @if (features()?.discogsEnabled) {
    <button mat-raised-button routerLink="/pick" routerLinkActive="active-link" style="margin-right: 8px;">
      🎲 Pick
    </button>
    <button mat-raised-button routerLink="/maintenance" routerLinkActive="active-link" style="margin-right: 8px;">
      🔧 Maintenance
    </button>
  }
  <button mat-raised-button routerLink="/stores" routerLinkActive="active-link" style="margin-right: 8px;">
    🏪 Stores
  </button>
  <button mat-raised-button routerLink="/statistics" routerLinkActive="active-link" style="margin-right: 8px;">
    📊 Statistics
  </button>
  <button mat-icon-button routerLink="/settings" routerLinkActive="active-link" matTooltip="Settings" style="margin-right: 8px;">
    <mat-icon>settings</mat-icon>
  </button>
  @if (features()?.discogsEnabled) {
    <button mat-raised-button color="accent" [disabled]="syncState.discogsSyncing()" (click)="syncState.startDiscogsSync()">
      @if (syncState.discogsSyncing()) {
        <mat-spinner diameter="20" style="display: inline-block; margin-right: 4px;"></mat-spinner>
        {{ syncState.discogsSyncStatusLabel }}
      } @else {
        Sync Records
      }
    </button>
  }
  @if (features()?.hardcoverEnabled) {
    <button mat-raised-button color="accent" [disabled]="syncState.booksSyncing()" (click)="syncState.startBooksSync()" style="margin-left: 8px;">
      @if (syncState.booksSyncing()) {
        <mat-spinner diameter="20" style="display: inline-block; margin-right: 4px;"></mat-spinner>
        Syncing Books…
      } @else {
        Sync Books
      }
    </button>
  }
</mat-toolbar>

<router-outlet />
